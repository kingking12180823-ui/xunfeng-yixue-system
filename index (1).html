<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>巽風易學決策系統｜商業版</title>
<style>
:root{--blue:#10203A;--blue2:#18345F;--gold:#BE9B63;--bg:#eef3fa;--line:#d8e2f0;--muted:#64748b}
*{box-sizing:border-box}body{margin:0;font-family:"Microsoft JhengHei",Arial,sans-serif;background:radial-gradient(circle at top left,#fff,#eef3fa 48%,#dbe6f3);color:var(--blue)}
header{position:sticky;top:0;background:rgba(255,255,255,.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);z-index:9}
.wrap{max-width:1200px;margin:auto;padding:0 20px}.nav{display:flex;justify-content:space-between;align-items:center;padding:16px 0}.brand{display:flex;gap:12px;align-items:center}.logo{width:50px;height:50px;border-radius:18px;background:var(--blue);color:#fff;display:grid;place-items:center;font-size:24px}.brand h1{font-size:22px;margin:0}.brand p{margin:4px 0 0;color:var(--muted);font-size:13px}
.btn{border:0;border-radius:16px;padding:12px 18px;font-weight:900;cursor:pointer}.primary{background:var(--blue);color:#fff}.gold{background:var(--gold);color:#fff}.soft{background:#fff;border:1px solid var(--line);color:var(--blue)}
.hero{display:grid;grid-template-columns:1.1fr .9fr;gap:24px;padding:38px 0}.card{background:rgba(255,255,255,.88);border:1px solid #fff;border-radius:30px;box-shadow:0 20px 60px rgba(16,32,58,.08)}.inner{padding:30px}.hero h2{font-size:46px;line-height:1.1;margin:12px 0}.hero p{color:#52627a;line-height:1.9}.chip{display:inline-block;background:#f7ead8;color:#7b5b27;border-radius:999px;padding:8px 14px;font-weight:900;font-size:13px}
.grid{display:grid;gap:16px}.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
label{display:block;font-weight:900;font-size:14px;margin-bottom:8px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:18px;padding:13px 14px;font-size:15px;background:#fff}textarea{min-height:95px;resize:vertical}
.step{margin:22px 0}.step h3{font-size:24px;margin:0 0 18px}.num{display:inline-grid;place-items:center;width:38px;height:38px;border-radius:14px;background:var(--blue);color:#fff;margin-right:10px}.topic,.mod{border:1px solid var(--line);background:#fff;border-radius:18px;padding:14px;text-align:left;font-weight:900}.active{background:var(--blue)!important;color:#fff!important}.tabs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}.tab{border:0;border-radius:999px;padding:10px 15px;font-weight:900;background:#e8eef7;color:#334155}
pre{white-space:pre-wrap;background:#fff;border:1px solid var(--line);border-radius:20px;padding:18px;max-height:520px;overflow:auto;line-height:1.75}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.metric{background:#fff;border:1px solid var(--line);border-radius:20px;padding:18px}.metric b{font-size:26px}
@media(max-width:900px){.hero,.g2,.g3,.g4,.metrics{grid-template-columns:1fr}.hero h2{font-size:34px}}
</style>
</head>
<body>
<header><div class="wrap nav"><div class="brand"><div class="logo">☯</div><div><h1>巽風易學決策系統</h1><p>專業顧問｜四術同步｜策略校核｜商業報告交付</p></div></div><button class="btn primary" onclick="scrollToApp()">進入工作台</button></div></header>
<main class="wrap">
<section class="hero">
<div class="card"><div class="inner"><span class="chip">Premium Consulting System</span><h2>把問事流程，升級成可交付的顧問報告。</h2><p>這版已修正為下拉式出生年月日時，四術各有自己的輸入介面，不再叫使用者自己貼盤。系統以風羿老師綜合判讀為主體，輸出商業化報告。</p><button class="btn gold" onclick="scrollToApp()">開始建立報告</button></div></div>
<div class="card" style="background:#10203A;color:white"><div class="inner"><span class="chip">商業化重點</span><div class="grid" style="margin-top:18px"><div>✓ 下拉式出生年月日時</div><div>✓ 八字、奇門、六爻、梅花獨立介面</div><div>✓ 綜合評判一次生成</div><div>✓ 報告與 JSON 可複製下載</div></div></div></div>
</section>

<section id="app" class="card step"><div class="inner">
<h3><span class="num">1</span>共同資料</h3>
<div class="grid g2">
<div><label>案主姓名</label><input id="clientName" placeholder="例如：王先生"></div>
<div><label>性別／身分</label><select id="gender"><option>男</option><option>女</option><option>其他／不指定</option><option>企業主</option><option>考生</option></select></div>
<div><label>問題類型</label><select id="topic"><option value="career">事業／工作</option><option value="wealth">財運／投資</option><option value="exam">考試／升學</option><option value="relationship">感情／人際</option><option value="home">房產／陽宅</option><option value="health">健康／身心</option></select></div>
<div><label>報告模板</label><select id="template"><option>商業決策顧問報告</option><option>標準個人諮詢報告</option><option>企業主管簡報版</option><option>教學展示版</option></select></div>
<div style="grid-column:1/-1"><label>問題主軸</label><input id="question" placeholder="例如：今年是否適合創業？"></div>
<div style="grid-column:1/-1"><label>背景補充</label><textarea id="context" placeholder="目前卡在哪裡？已做了什麼？涉及哪些人？"></textarea></div>
</div>
</div></section>

<section class="card step"><div class="inner">
<h3><span class="num">2</span>出生年月日時｜下拉式輸入</h3>
<div class="grid g4">
<div><label>曆法</label><select id="calendar"><option>國曆</option><option>農曆</option></select></div>
<div><label>出生年</label><select id="birthYear"></select></div>
<div><label>出生月</label><select id="birthMonth"></select></div>
<div><label>出生日</label><select id="birthDay"></select></div>
<div><label>出生時辰</label><select id="birthHour"></select></div>
<div><label>是否閏月</label><select id="leap"><option>否</option><option>是</option><option>不確定</option></select></div>
<div><label>時辰是否確定</label><select id="timeKnown"><option>是</option><option>否</option><option>不確定</option></select></div>
<div><label>策略校核層</label><select id="review"><option>啟用策略校核層</option><option>啟用深度反證層</option><option>不啟用</option></select></div>
</div>
</div></section>

<section class="card step"><div class="inner">
<h3><span class="num">3</span>四術專用介面</h3>
<div class="grid g2">
<div><label>八字命理</label><select id="baziMode"><option>依出生資料自動初判</option><option>補充四柱資料</option><option>只看流年趨勢</option></select></div>
<div><label>奇門遁甲｜起局方式</label><select id="qimenMode"><option>現在起局</option><option>指定時間</option><option>不確定，由系統抓目前時間</option></select></div>
<div><label>奇門遁甲｜事件方位</label><select id="direction"><option>不確定</option><option>乾</option><option>兌</option><option>離</option><option>震</option><option>巽</option><option>坎</option><option>艮</option><option>坤</option></select></div>
<div><label>六爻｜起卦方式</label><select id="liuyaoMode"><option>時間起卦</option><option>三枚銅錢</option></select></div>
<div><label>初爻</label><select class="yao"><option>不會判斷，請用時間起卦</option><option>少陽</option><option>少陰</option><option>老陽</option><option>老陰</option></select></div>
<div><label>二爻</label><select class="yao"><option>不會判斷，請用時間起卦</option><option>少陽</option><option>少陰</option><option>老陽</option><option>老陰</option></select></div>
<div><label>三爻</label><select class="yao"><option>不會判斷，請用時間起卦</option><option>少陽</option><option>少陰</option><option>老陽</option><option>老陰</option></select></div>
<div><label>四爻</label><select class="yao"><option>不會判斷，請用時間起卦</option><option>少陽</option><option>少陰</option><option>老陽</option><option>老陰</option></select></div>
<div><label>五爻</label><select class="yao"><option>不會判斷，請用時間起卦</option><option>少陽</option><option>少陰</option><option>老陽</option><option>老陰</option></select></div>
<div><label>上爻</label><select class="yao"><option>不會判斷，請用時間起卦</option><option>少陽</option><option>少陰</option><option>老陽</option><option>老陰</option></select></div>
<div><label>梅花易數｜起卦方式</label><select id="meihuaMode"><option>時間起卦</option><option>數字起卦</option><option>上下卦起卦</option></select></div>
<div><label>梅花易數｜上卦</label><select id="upperGua"><option>乾</option><option>兌</option><option>離</option><option>震</option><option>巽</option><option>坎</option><option>艮</option><option>坤</option></select></div>
<div><label>梅花易數｜下卦</label><select id="lowerGua"><option>坤</option><option>艮</option><option>坎</option><option>巽</option><option>震</option><option>離</option><option>兌</option><option>乾</option></select></div>
</div>
<div style="margin-top:22px"><button class="btn gold" onclick="generateReport()">生成綜合報告</button> <button class="btn soft" onclick="resetAll()">重設</button></div>
</div></section>

<section class="card step"><div class="inner">
<h3><span class="num">4</span>輸出中心</h3>
<div id="metrics" class="metrics" style="display:none"></div>
<div class="tabs"><button class="tab active" onclick="showTab('report')">正式報告</button><button class="tab" onclick="showTab('json')">JSON資料包</button></div>
<pre id="output">尚未生成報告。</pre>
<button class="btn primary" onclick="copyOutput()">複製目前內容</button>
<button class="btn soft" onclick="downloadOutput()">下載</button>
</div></section>
</main>
<script>
const y=document.getElementById('birthYear'), m=document.getElementById('birthMonth'), d=document.getElementById('birthDay'), h=document.getElementById('birthHour');
const now=new Date().getFullYear(); for(let i=now;i>=now-100;i--) y.add(new Option(i,i)); for(let i=1;i<=12;i++) m.add(new Option(i,i)); for(let i=1;i<=31;i++) d.add(new Option(i,i));
[['子','23:00-00:59'],['丑','01:00-02:59'],['寅','03:00-04:59'],['卯','05:00-06:59'],['辰','07:00-08:59'],['巳','09:00-10:59'],['午','11:00-12:59'],['未','13:00-14:59'],['申','15:00-16:59'],['酉','17:00-18:59'],['戌','19:00-20:59'],['亥','21:00-22:59'],['不確定','不知道出生時辰']].forEach(x=>h.add(new Option(`${x[0]}｜${x[1]}`,x[0])));
let current='report', lastReport='', lastJson='';
function scrollToApp(){document.getElementById('app').scrollIntoView({behavior:'smooth'})}
function val(id){return document.getElementById(id).value}
function score(s){return 60+[...s].reduce((a,c)=>a+c.charCodeAt(0),0)%34}
function risk(sc){return sc>=86?['低風險，高推進','可進攻']:sc>=76?['中低風險，可控推進','可試行']:sc>=66?['中風險，需設條件','先測後動']:['高風險，宜保守布局','暫緩決策']}
function topicName(){return document.getElementById('topic').selectedOptions[0].text}
function generateReport(){
 const data={client:val('clientName')||'未填',gender:val('gender'),topic:topicName(),question:val('question')||'未填',context:val('context'),birth:{calendar:val('calendar'),year:val('birthYear'),month:val('birthMonth'),day:val('birthDay'),hour:val('birthHour'),leap:val('leap'),timeKnown:val('timeKnown')},modules:{bazi:val('baziMode'),qimen:{mode:val('qimenMode'),direction:val('direction')},liuyao:{mode:val('liuyaoMode'),yao:[...document.querySelectorAll('.yao')].map(x=>x.value)},meihua:{mode:val('meihuaMode'),upper:val('upperGua'),lower:val('lowerGua')}}};
 const sc=score(JSON.stringify(data)); const [rk,dec]=risk(sc);
 lastReport=`# 巽風易學綜合決策報告

**報告模板：** ${val('template')}
**案主：** ${data.client}
**性別／身分：** ${data.gender}
**問題類型：** ${data.topic}
**問題主軸：** ${data.question}
**出生資料：** ${data.birth.calendar} ${data.birth.year}年${data.birth.month}月${data.birth.day}日 ${data.birth.hour}時
**綜合分數：** ${sc}/100
**風險判讀：** ${rk}
**行動建議：** ${dec}

---

## 一、系統總論
本案採用八字命理、奇門遁甲、卜卦／六爻、梅花易數進行交叉驗證。重點不是單點斷言，而是把長期承載、當下局勢、事件卡點與象意變化，收斂成可執行決策。

## 二、分項判讀

### 1. 八字命理
- 依出生年月日時進行初步承載力判斷。
- 建議色系與行動節奏需待正式四柱節氣引擎確認後定稿。
- 風羿老師綜合修正見解：先以低風險方式調整作息、穿搭、文件與談判節奏。

### 2. 奇門遁甲
- 起局方式：${data.modules.qimen.mode}
- 事件方位：${data.modules.qimen.direction}
- 風羿老師綜合修正見解：先找可借勢的人、時、地與文件條件，不做無條件硬衝。

### 3. 卜卦／六爻
- 起卦方式：${data.modules.liuyao.mode}
- 六爻資料：${data.modules.liuyao.yao.join('／')}
- 風羿老師綜合修正見解：把口頭承諾轉成文字、期限與責任人。

### 4. 梅花易數
- 起卦方式：${data.modules.meihua.mode}
- 上卦：${data.modules.meihua.upper}；下卦：${data.modules.meihua.lower}
- 風羿老師綜合修正見解：觀察三日內重複出現的人、話、數字、方位或時間點。

## 三、商業化行動方案
1. 本週先做一個可驗證行動。
2. 所有條件文件化。
3. 不一次投入全部資源。
4. 實際結果回填，作為下次判讀基礎。

## 四、專業聲明
本報告為易學決策輔助，不取代法律、醫療、財務與現場風水勘查。涉及陽宅、陰宅或重大投資，仍需由風羿老師本人親至現場評估。`;
 data.integrated={score:sc,risk:rk,decision:dec}; lastJson=JSON.stringify(data,null,2);
 document.getElementById('metrics').style.display='grid';
 document.getElementById('metrics').innerHTML=`<div class="metric"><small>總分</small><br><b>${sc}</b></div><div class="metric"><small>風險</small><br><b>${rk}</b></div><div class="metric"><small>建議</small><br><b>${dec}</b></div>`;
 showTab('report');
}
function showTab(t){current=t; document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); event?.target?.classList.add('active'); document.getElementById('output').textContent=t==='json'?lastJson:lastReport||'尚未生成報告。'}
function copyOutput(){navigator.clipboard.writeText(document.getElementById('output').textContent); alert('已複製')}
function downloadOutput(){const text=document.getElementById('output').textContent; const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([text],{type:'text/plain'})); a.download=current==='json'?'xunfeng-payload.json':'xunfeng-report.md'; a.click()}
function resetAll(){location.reload()}
</script>
</body>
</html>
